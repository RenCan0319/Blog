<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>Jeff · 内容管理</title>
</head>
<body>
  <!-- Prevent auto-init so we can pass config inline -->
  <script>window.CMS_MANUAL_INIT = true;</script>
  <!-- Decap CMS loader: pinned stable build -->
  <script src="https://unpkg.com/decap-cms@3.3.1/dist/decap-cms.js"></script>
  <script>
    window.CMS.init({
      config: {
        backend: {
          name: "github",
          repo: "RenCan0319/Blog",
          branch: "main",
          base_url: "https://jeff-decap-oauth.rcan9764.workers.dev",
          auth_scope: "repo"
        },
        media_folder: "assets/img",
        public_folder: "/assets/img",
        collections: [
          {
            name: "posts",
            label: "文章",
            label_singular: "文章",
            folder: "posts",
            slug: "{{slug}}",
            extension: "md",
            format: "yaml-frontmatter",
            fields: [
              { name: "title", label: "标题", widget: "string" },
              { name: "date", label: "发布日期", widget: "date", format: "YYYY-MM-DD" },
              {
                name: "category",
                label: "分类",
                widget: "select",
                options: ["Zendesk", "Amazon Connect", "随想", "工程笔记"]
              },
              { name: "cover", label: "封面图", widget: "image", required: false },
              { name: "excerpt", label: "摘要", widget: "text" },
              { name: "body", label: "正文", widget: "markdown", required: false }
            ]
          }
        ]
      }
    });
  </script>
</body>
</html>
