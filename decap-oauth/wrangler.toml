name = "jeff-decap-oauth"
main = "worker.js"
compatibility_date = "2025-06-01"

# 前置：首次部署前需认领 workers.dev 子域（Dashboard → Workers & Pages → 你的子域），
# 否则 `wrangler deploy` 会报 "register a workers.dev subdomain"。

# GitHub OAuth App 凭据
#   Client ID（非机密）直接放在这里：
[vars]
GITHUB_CLIENT_ID = "Ov23li6srevqrtijVVsE"
CMS_BASE = "https://your-live-site.example.com"   # ← 改成你的 Pages 地址或自定义域名（Decap 后台所在地址）

# Client Secret（机密）请用 secret 注入，切勿写进仓库：
#   npx wrangler secret put GITHUB_CLIENT_SECRET
#   提示粘贴时，输入你生成的 Secret 值。
